  </defs>
  <rect width="200" height="200" fill="url(#grad4)"/>
  <!-- Container -->
  <rect x="70" y="60" width="60" height="80" rx="3" fill="none" stroke="#FFB800" stroke-width="2.5"/>
  <ellipse cx="100" cy="60" rx="30" ry="8" fill="none" stroke="#FFB800" stroke-width="2.5"/>
